name: Deploy NodeJs on EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: QEMU
        uses: docker/setup-qemu-action@v4

      - name: set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Docker Build and Push
        run: |
          docker build -t gopalchoudhary/deployment-node .
          docker push gopalchoudhary/deployment-node

      - name: Deploy on EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 13.206.240.26
          username: ubuntu
          key: ${{secrets.PRIVATE_KEY}}
          script: |
            # Kill the existing docker container
            sudo docker rm -f deployment-node || true

            # Pull the fresh image from docker hub
            sudo docker pull gopalchoudhary/deployment-node

            # Run docker -d -p 8000:8000 gopalchoudhary/deployment-node
            sudo docker run -d --name deployment-node --restart unless-stopped -p 8000:8000 gopalchoudhary/deployment-node

            # Clean up old/unused images
            sudo docker image prune -f
