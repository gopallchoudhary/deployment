services:
  traefik:
    image: traefik:v3.1
    environment:
      - DOCKER_API_VERSION=1.55
    command:
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      # HTTP entrypoint with global redirect to HTTPS
      - "--entrypoints.web.address=:80"
      - "--entrypoints.web.http.redirections.entryPoint.to=websecure"
      - "--entrypoints.web.http.redirections.entryPoint.scheme=https"
      - "--entrypoints.web.http.redirections.entryPoint.permanent=true"
      # HTTPS entrypoint
      - "--entrypoints.websecure.address=:443"
      # Let's Encrypt via TLS challenge
      - "--certificatesresolvers.myresolver.acme.tlschallenge=true"
      - "--certificatesresolvers.myresolver.acme.email=gopal@gopalchoudhary.dev"
      - "--certificatesresolvers.myresolver.acme.storage=/letsencrypt/acme.json"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./letsencrypt:/letsencrypt
    networks:
      - deploynode-internal

  nodejs-server:
    image: gopalchoudhary/deployment-node
    networks:
      - deploynode-internal
    labels:
      - "traefik.enable=true"
      # HTTPS router only (HTTP is redirected globally above)
      - "traefik.http.routers.nodejs.rule=Host(`ex.gopalchoudhary.dev`)"
      - "traefik.http.routers.nodejs.entrypoints=websecure"
      - "traefik.http.routers.nodejs.tls.certresolver=myresolver"
      - "traefik.http.services.nodejs.loadbalancer.server.port=8000"

networks:
  deploynode-internal:
    driver: bridge